server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # handle React Router — always serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # disable caching for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}